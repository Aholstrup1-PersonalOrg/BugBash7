name: Test Token Auth
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-token:
    runs-on: windows-latest
    steps:
      - name: Test HEAD without token
        shell: pwsh
        run: |
          Write-Host "=== HEAD request WITHOUT token ==="
          try {
            $response = Invoke-WebRequest -UseBasicParsing -Method Head -Uri "https://github.com/microsoft/AL-Go"
            Write-Host "StatusCode: $($response.StatusCode)"
            Write-Host "Headers:"
            $response.Headers.GetEnumerator() | ForEach-Object { Write-Host "  $($_.Key): $($_.Value)" }
          }
          catch {
            Write-Host "FAILED: $($_.Exception.Message)"
            Write-Host "Status: $($_.Exception.Response.StatusCode) ($($_.Exception.Response.StatusCode.value__))"
            Write-Host "Response Headers:"
            if ($_.Exception.Response.Headers) {
              $_.Exception.Response.Headers | ForEach-Object { Write-Host "  $_" }
            }
          }

      - name: Test HEAD with GITHUB_TOKEN
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          Write-Host "=== HEAD request WITH GITHUB_TOKEN ==="
          $headers = @{
            "Accept" = "application/vnd.github+json"
            "Authorization" = "token $env:GITHUB_TOKEN"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          try {
            $response = Invoke-WebRequest -UseBasicParsing -Method Head -Headers $headers -Uri "https://github.com/microsoft/AL-Go"
            Write-Host "StatusCode: $($response.StatusCode)"
            Write-Host "Headers:"
            $response.Headers.GetEnumerator() | ForEach-Object { Write-Host "  $($_.Key): $($_.Value)" }
          }
          catch {
            Write-Host "FAILED: $($_.Exception.Message)"
            Write-Host "Status: $($_.Exception.Response.StatusCode) ($($_.Exception.Response.StatusCode.value__))"
          }

      - name: Test API endpoint without token
        shell: pwsh
        run: |
          Write-Host "=== API request WITHOUT token ==="
          try {
            $response = Invoke-WebRequest -UseBasicParsing -Method Head -Uri "https://api.github.com/repos/microsoft/AL-Go"
            Write-Host "StatusCode: $($response.StatusCode)"
          }
          catch {
            Write-Host "FAILED: $($_.Exception.Message)"
            Write-Host "Status: $($_.Exception.Response.StatusCode) ($($_.Exception.Response.StatusCode.value__))"
          }

      - name: Test API endpoint with GITHUB_TOKEN
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          Write-Host "=== API request WITH GITHUB_TOKEN ==="
          $headers = @{
            "Accept" = "application/vnd.github+json"
            "Authorization" = "token $env:GITHUB_TOKEN"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          try {
            $response = Invoke-WebRequest -UseBasicParsing -Method Head -Headers $headers -Uri "https://api.github.com/repos/microsoft/AL-Go"
            Write-Host "StatusCode: $($response.StatusCode)"
          }
          catch {
            Write-Host "FAILED: $($_.Exception.Message)"
            Write-Host "Status: $($_.Exception.Response.StatusCode) ($($_.Exception.Response.StatusCode.value__))"
          }