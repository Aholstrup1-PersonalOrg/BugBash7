name: Test Token Auth
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  test-token:
    runs-on: windows-latest
    steps:
      - name: Test HEAD without token
        shell: pwsh
        run: |
          Write-Host "=== HEAD request WITHOUT token ==="
          try {
            $r = Invoke-WebRequest -UseBasicParsing -Method Head -Uri "https://github.com/microsoft/AL-Go"
            Write-Host "StatusCode: $($r.StatusCode)"
            Write-Host "StatusDescription: $($r.StatusDescription)"
            $r.Headers.GetEnumerator() | ForEach-Object { Write-Host "  $($_.Key): $($_.Value)" }
          } catch {
            Write-Host "FAILED: $($_.Exception.Message)"
            Write-Host "Status: $($_.Exception.Response.StatusCode) ($([int]$_.Exception.Response.StatusCode))"
            Write-Host "Response Headers:"
            if ($_.Exception.Response) {
              foreach ($key in $_.Exception.Response.Headers.AllKeys) {
                Write-Host "  $($key): $($_.Exception.Response.Headers[$key])"
              }
            }
            $stream = $_.Exception.Response.GetResponseStream()
            if ($stream) {
              $reader = New-Object System.IO.StreamReader($stream)
              Write-Host "Response Body: $($reader.ReadToEnd())"
              $reader.Close()
            }
          }
      - name: Test HEAD with GITHUB_TOKEN
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Write-Host "=== HEAD request WITH GITHUB_TOKEN ==="
          $h = @{ "Accept"="application/vnd.github+json"; "Authorization"="token $env:GH_TOKEN"; "X-GitHub-Api-Version"="2022-11-28" }
          try {
            $r = Invoke-WebRequest -UseBasicParsing -Method Head -Headers $h -Uri "https://github.com/microsoft/AL-Go"
            Write-Host "StatusCode: $($r.StatusCode)"
            Write-Host "StatusDescription: $($r.StatusDescription)"
            $r.Headers.GetEnumerator() | ForEach-Object { Write-Host "  $($_.Key): $($_.Value)" }
          } catch {
            Write-Host "FAILED: $($_.Exception.Message)"
            Write-Host "Status: $($_.Exception.Response.StatusCode) ($([int]$_.Exception.Response.StatusCode))"
            Write-Host "Response Headers:"
            if ($_.Exception.Response) {
              foreach ($key in $_.Exception.Response.Headers.AllKeys) {
                Write-Host "  $($key): $($_.Exception.Response.Headers[$key])"
              }
            }
            $stream = $_.Exception.Response.GetResponseStream()
            if ($stream) {
              $reader = New-Object System.IO.StreamReader($stream)
              Write-Host "Response Body: $($reader.ReadToEnd())"
              $reader.Close()
            }
          }