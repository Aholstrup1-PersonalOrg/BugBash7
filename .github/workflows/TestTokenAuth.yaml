name: Test Token Auth
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  test-token:
    runs-on: windows-latest
    steps:
      - name: Test HEAD with GITHUB_TOKEN
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Write-Host "=== HEAD request WITH GITHUB_TOKEN ==="
          $h = @{ "Accept"="application/vnd.github+json"; "Authorization"="token $env:GH_TOKEN"; "X-GitHub-Api-Version"="2022-11-28" }
          try {
            $r = Invoke-WebRequest -UseBasicParsing -Method Head -Headers $h -Uri "https://github.com/microsoft/AL-Go"
            Write-Host "StatusCode: $($r.StatusCode)"
            $r.Headers.GetEnumerator() | ForEach-Object { Write-Host "  $($_.Key): $($_.Value)" }
          } catch {
            Write-Host "FAILED: $($_.Exception.Message)"
            $resp = $_.Exception.Response
            Write-Host "Status: $($resp.StatusCode) ($([int]$resp.StatusCode))"
            Write-Host "ReasonPhrase: $($resp.ReasonPhrase)"
            Write-Host "Response Headers:"
            foreach ($header in $resp.Headers) {
              $vals = $resp.Headers.GetValues($header)
              Write-Host "  $($header): $($vals -join ', ')"
            }
            foreach ($header in $resp.Content.Headers) {
              $vals = $resp.Content.Headers.GetValues($header)
              Write-Host "  $($header): $($vals -join ', ')"
            }
            $body = $resp.Content.ReadAsStringAsync().Result
            Write-Host "Response Body: $body"
          }
      - name: Test GET with GITHUB_TOKEN
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Write-Host "=== GET request WITH GITHUB_TOKEN ==="
          $h = @{ "Accept"="application/vnd.github+json"; "Authorization"="token $env:GH_TOKEN"; "X-GitHub-Api-Version"="2022-11-28" }
          try {
            $r = Invoke-WebRequest -UseBasicParsing -Method Get -Headers $h -Uri "https://github.com/microsoft/AL-Go"
            Write-Host "StatusCode: $($r.StatusCode)"
          } catch {
            Write-Host "FAILED: $($_.Exception.Message)"
            $resp = $_.Exception.Response
            Write-Host "Status: $($resp.StatusCode) ($([int]$resp.StatusCode))"
            $body = $resp.Content.ReadAsStringAsync().Result
            Write-Host "Response Body: $body"
          }